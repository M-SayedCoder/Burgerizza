<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Burgerizza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/signup.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <a href="index.html" class="auth-back"><i class="bi bi-arrow-left"></i></a>
    <label class="dark-toggle" style="position:absolute;top:20px;right:20px;"><input type="checkbox" id="darkToggle"><div class="dark-toggle-slider"></div></label>

    <div class="auth-logo">Burger<span>izza</span></div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Login</button>
      <button class="auth-tab" data-tab="register">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="input-group-label">Email</div>
      <input type="email" class="bzr-input" placeholder="you@example.com" style="margin-bottom:12px;" id="loginEmail">
      <div class="input-group-label">Password</div>
      <div class="pw-wrap">
        <input type="password" class="bzr-input" placeholder="••••••••" id="loginPw">
        <button class="pw-eye" id="togglePw"><i class="bi bi-eye"></i></button>
      </div>
      <a href="#" class="forgot-link">Forgot password?</a>
      <button class="btn-brand w-full" id="loginBtn" style="margin-top:20px;padding:14px;font-size:15px;">Sign In</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none;">
      <div class="input-group-label">Full Name</div>
      <input type="text" class="bzr-input" placeholder="Your name" style="margin-bottom:12px;" id="regName">
      <div class="input-group-label">Email</div>
      <input type="email" class="bzr-input" placeholder="you@example.com" style="margin-bottom:12px;" id="regEmail">
      <div class="input-group-label">Password</div>
      <input type="password" class="bzr-input" placeholder="Min. 8 characters" style="margin-bottom:20px;" id="regPw">
      <button class="btn-brand w-full" id="registerBtn" style="padding:14px;font-size:15px;">Create Account</button>
    </div>

    <div class="auth-divider"><span>or continue with</span></div>
    <div class="social-auth">
      <button class="social-btn"><i class="bi bi-google" style="color:#EA4335;"></i> Google</button>
      <button class="social-btn"><i class="bi bi-apple"></i> Apple</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="./assets/js/global.js"></script>
<script src="./assets/js/signup.js"></script>
<nav class="bottom-nav" style="display:none;">
  <a href="index.html"><i class="bi bi-house"></i>Home</a>
  <a href="all-categories.html"><i class="bi bi-grid-3x3-gap"></i>Menu</a>
  <a href="offers.html"><i class="bi bi-tag"></i>Offers</a>
  <a href="cart.html"><i class="bi bi-bag"></i>Cart<span class="bnav-badge cart-badge" style="display:none;">0</span></a>
  <a href="menu.html"><i class="bi bi-person"></i>Profile</a>
</nav>
<script src="./assets/js/sidebar.js"></script>
</body>
</html>
