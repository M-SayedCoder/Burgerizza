<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile — Burgerizza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/sidebar.css">
  <link rel="stylesheet" href="./assets/css/edit-profile.css">
</head>
<body>
<header class="bzr-header">
  <div class="container">
    <a href="menu.html" class="icon-btn"><i class="bi bi-arrow-left"></i></a>
    <span class="bzr-logo" style="flex:1;text-align:center;">Edit Profile</span>
    <div style="display:flex;gap:8px;align-items:center;"><label class="dark-toggle"><input type="checkbox" id="darkToggle"><div class="dark-toggle-slider"></div></label><button class="icon-btn hamburger-btn" id="sidebarToggle"><i class="bi bi-list"></i></button></div>
  </div>
</header>
<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-profile">
      <div class="sidebar-avatar">🙂</div>
      <div class="sidebar-user-info">
        <div class="sidebar-name">John Doe</div>
        <div class="sidebar-email">john@example.com</div>
      </div>
    </div>
    <button class="icon-btn sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html" class="sidebar-link"><i class="bi bi-house"></i><span>Home</span></a>
    <a href="all-categories.html" class="sidebar-link"><i class="bi bi-grid-3x3-gap"></i><span>Browse Menu</span></a>
    <a href="offers.html" class="sidebar-link"><i class="bi bi-tag"></i><span>Offers &amp; Deals</span><span class="sidebar-badge">4</span></a>
    <a href="order-history.html" class="sidebar-link"><i class="bi bi-clock-history"></i><span>My Orders</span></a>
    <a href="wishlist.html" class="sidebar-link"><i class="bi bi-heart"></i><span>Wishlist</span></a>
    <a href="order-tracking.html" class="sidebar-link"><i class="bi bi-geo-alt"></i><span>Track Order</span></a>
    <div class="sidebar-divider"></div>
    <a href="edit-profile.html" class="sidebar-link"><i class="bi bi-person"></i><span>Personal Info</span></a>
    <a href="address.html" class="sidebar-link"><i class="bi bi-house-door"></i><span>Addresses</span></a>
    <a href="checkout.html" class="sidebar-link"><i class="bi bi-credit-card"></i><span>Payment Methods</span></a>
    <a href="reviews.html" class="sidebar-link"><i class="bi bi-star"></i><span>Reviews</span></a>
    <a href="faqs.html" class="sidebar-link"><i class="bi bi-question-circle"></i><span>FAQs</span></a>
    <div class="sidebar-divider"></div>
    <a href="signup.html" class="sidebar-link sidebar-link-danger"><i class="bi bi-box-arrow-right"></i><span>Sign In / Sign Up</span></a>
  </nav>
</div>
<div class="page-wrap" style="max-width:560px;">
  <div class="profile-pic-section fade-up">
    <div class="edit-avatar">🙂</div>
    <button class="btn-ghost" style="font-size:13px;"><i class="bi bi-camera"></i> Change Photo</button>
  </div>
  <div class="edit-form fade-up delay-1">
    <div class="edit-field">
      <label class="edit-label">Full Name</label>
      <input type="text" class="bzr-input" value="John Doe" id="eName">
    </div>
    <div class="edit-field">
      <label class="edit-label">Email Address</label>
      <input type="email" class="bzr-input" value="john@example.com" id="eEmail">
    </div>
    <div class="edit-field">
      <label class="edit-label">Phone Number</label>
      <input type="tel" class="bzr-input" value="+1 234 567 8900" id="ePhone">
    </div>
    <div class="edit-field">
      <label class="edit-label">Date of Birth</label>
      <input type="date" class="bzr-input" value="1995-06-15" id="eDob">
    </div>
    <div class="edit-field">
      <label class="edit-label">Change Password</label>
      <input type="password" class="bzr-input" placeholder="New password" id="ePw">
    </div>
    <button class="btn-brand w-full" id="saveProfile" style="padding:14px;font-size:15px;margin-top:8px;">
      <i class="bi bi-check2"></i> Save Changes
    </button>
  </div>
</div>
<div id="toast-container"></div>
<script src="./assets/js/global.js"></script>
<script>
  document.getElementById("saveProfile")?.addEventListener("click", () => {
    showToast("Profile updated! ✅", "success");
  });
</script>
<nav class="bottom-nav" style="display:none;">
  <a href="index.html"><i class="bi bi-house"></i>Home</a>
  <a href="all-categories.html"><i class="bi bi-grid-3x3-gap"></i>Menu</a>
  <a href="offers.html"><i class="bi bi-tag"></i>Offers</a>
  <a href="cart.html"><i class="bi bi-bag"></i>Cart<span class="bnav-badge cart-badge" style="display:none;">0</span></a>
  <a href="menu.html"><i class="bi bi-person"></i>Profile</a>
</nav>
<script src="./assets/js/sidebar.js"></script>
</body>
</html>
